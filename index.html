<!DOCTYPE html>
<html>

<head>
<title>Minha Calculadora</title>

<style>

body{
font-family: Arial;
background-color: #f2f2f2;
text-align: center;
margin-top: 100px;
}

h2{
color: #333;
}

input{
padding: 10px;
margin: 10px;
width: 200px;
font-size: 16px;
}

button{
padding: 10px 20px;
margin: 5px;
background-color: #4CAF50;
color: white;
border: none;
border-radius: 5px;
font-size: 16px;
cursor: pointer;
}

button:hover{
background-color: #45a049;
}

#resultado{
margin-top: 20px;
font-size: 20px;
font-weight: bold;
}

</style>

</head>

<body>

<h2>Minha Calculadora</h2>

<input id="n1" type="number" placeholder="Primeiro número">
<br>

<input id="n2" type="number" placeholder="Segundo número">
<br><br>

<button onclick="somar()">Somar</button>
<button onclick="subtrair()">Subtrair</button>
<button onclick="multiplicar()">Multiplicar</button>
<button onclick="dividir()">Dividir</button>

<p id="resultado"></p>

<script>

function somar(){
let a = Number(document.getElementById("n1").value)
let b = Number(document.getElementById("n2").value)

document.getElementById("resultado").innerText = "Resultado: " + (a + b)
}

function subtrair(){
let a = Number(document.getElementById("n1").value)
let b = Number(document.getElementById("n2").value)

document.getElementById("resultado").innerText = "Resultado: " + (a - b)
}

function multiplicar(){
let a = Number(document.getElementById("n1").value)
let b = Number(document.getElementById("n2").value)

document.getElementById("resultado").innerText = "Resultado: " + (a * b)
}

function dividir(){
let a = Number(document.getElementById("n1").value)
let b = Number(document.getElementById("n2").value)

document.getElementById("resultado").innerText = "Resultado: " + (a / b)
}

</script>

</body>
</html>
